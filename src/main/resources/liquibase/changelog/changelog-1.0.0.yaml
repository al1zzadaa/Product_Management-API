databaseChangeLog:
  - changeSet:
      id: added-new-test-table
      author: Sadiq
      changes:
        - createTable:
            tableName: test
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false